name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    paths:
      - "packages/voice-chess-core/**"
      - "packages/voice-chess-react/**"
      - "packages/voice-chess-server/**"
      - "examples/server/**"
      - "examples/web/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        working-directory: packages/voice-chess-server
        run: uv sync --group dev

      - name: Install example server dependencies
        working-directory: examples/server
        run: uv sync

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install e2e dependencies
        working-directory: tests/e2e
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: tests/e2e
        env:
          TEST_BASE_URL: http://127.0.0.1:5173
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7
