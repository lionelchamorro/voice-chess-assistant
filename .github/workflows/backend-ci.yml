name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]
    paths:
      - "packages/voice-chess-server/**"
      - "examples/server/**"
      - "prek.toml"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install toolchain
        run: |
          uv tool install prek
          uv tool install ruff

      - name: Run prek
        run: uvx prek run --files $(git ls-files packages/voice-chess-server examples/server prek.toml)

      - name: Install backend dependencies
        working-directory: packages/voice-chess-server
        run: uv sync --extra voice --group dev

      - name: Run backend tests
        working-directory: packages/voice-chess-server
        run: uv run pytest --timeout=120
